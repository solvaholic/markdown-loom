name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install VS Code Electron system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxss1 \
            libsecret-1-0 \
            libxkbfile1 \
            libgbm1 \
            libasound2 \
            libgtk-3-0 \
            libnss3 \
            xvfb

      - name: Start Xvfb and export DISPLAY
        run: |
          if ! pgrep -f "Xvfb :99" >/dev/null; then
            nohup Xvfb :99 -screen 0 1920x1080x24 >/tmp/xvfb.log 2>&1 &
            sleep 2
          fi
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
