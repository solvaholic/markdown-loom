name: Copilot Setup Steps

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 120000
          for attempt in $(seq 1 3); do
            if npm ci; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "npm ci failed on attempt ${attempt}; retrying..."
              sleep $((attempt * 5))
            fi
          done
          echo "npm ci failed after 3 attempts"
          exit 1

      - name: Install VS Code Electron system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxss1 \
            libsecret-1-0 \
            libxkbfile1 \
            libgbm1 \
            libasound2t64 \
            libgtk-3-0 \
            libnss3 \
            xvfb

      - name: Start Xvfb and export DISPLAY
        run: |
          if ! pgrep -f "Xvfb :99" >/dev/null; then
            nohup Xvfb :99 -screen 0 1920x1080x24 >/tmp/xvfb.log 2>&1 &
          fi
          for attempt in $(seq 1 15); do
            if [ -S /tmp/.X11-unix/X99 ]; then
              break
            fi
            sleep 1
          done
          if [ ! -S /tmp/.X11-unix/X99 ]; then
            echo "Xvfb failed to start on :99"
            exit 1
          fi
          echo "DISPLAY=:99" >> "$GITHUB_ENV"
